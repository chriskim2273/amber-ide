name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: rust (clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  rust-macos:
    # Apple Silicon: macos-latest runners are arm64 (aarch64-apple-darwin), so
    # this is a real arm64 build + link + test — the shipped mac artifact is a
    # universal binary (scripts/dist.sh lipos x86_64 + arm64). Guards against a
    # macOS/aarch64 regression (a Linux-only API, a broken cfg branch) landing.
    name: rust (macos / apple silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --all-targets
      - name: Test
        run: cargo test --workspace

  app:
    name: app (typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npx vitest run
      # `npm run lint` is intentionally omitted: the repo's eslint config predates
      # ESLint v9's required flat config (eslint.config.js), so `eslint .` errors
      # out on a pre-existing config issue unrelated to this workflow. Re-add the
      # lint step once the eslint config is migrated to flat config.
