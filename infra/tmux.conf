# ============================================================================
# amber-ide persistence spine
# tmux >= 3.2 required; developed and tested against tmux 3.4 (pinned in
# infra/README.md). Installed to ~/.config/tmux/tmux.conf by infra/install.sh.
# ============================================================================

# ---- baseline --------------------------------------------------------------
set -g history-limit 50000
set -g window-size latest

# ---- tmux-resurrect --------------------------------------------------------
set -g @resurrect-capture-pane-contents 'on'
# Restore any pane whose running command matches "claude" by relaunching it
# with --continue in that pane's saved working directory. Saved arguments are
# NOT preserved (no trailing *), so every flag wanted after a reboot must be
# spelled out here. --continue resumes the most recent conversation per
# directory; Phase 6 replaces it with precise per-pane session resume.
set -g @resurrect-processes '"~claude->claude --dangerously-skip-permissions --continue"'

# The boot units create a throwaway "_amber-boot" session so the server stays
# alive while continuum's restore runs; drop it once the real sessions are
# back. If nothing was restored the hook never fires and the bootstrap session
# stays, keeping the server alive. The name must never collide with a real
# session (the Phase 2 app uses "main" — that is why the bootstrap is not
# called "main": resurrect merges restored panes INTO an existing session of
# the same name, corrupting it with an extra pane).
set -g @resurrect-hook-post-restore-all 'tmux kill-session -t _amber-boot 2>/dev/null || true'

# ---- tmux-continuum --------------------------------------------------------
# Interval is in minutes; 1 is the lowest supported value.
set -g @continuum-save-interval '1'
# Restore fires exclusively on tmux server start (not on config sourcing).
set -g @continuum-restore 'on'
# Boot start is handled by infra/systemd + infra/launchd units instead of
# @continuum-boot: continuum's macOS boot support opens a visible Terminal.app
# window, while our units start the server headless on both platforms.
#
# NOTE: continuum's autosave timer piggybacks on status-right; the status line
# must stay on (tmux default) and no later config may overwrite status-right.

# ---- load vendored plugins (resurrect first, continuum must be last) -------
run-shell "$HOME/.local/share/amber-ide/plugins/tmux-resurrect/resurrect.tmux"
run-shell "$HOME/.local/share/amber-ide/plugins/tmux-continuum/continuum.tmux"
